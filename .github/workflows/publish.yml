# Publish yeti-agent to PyPI
#
# Triggers:
#   - On GitHub Release creation → build & publish to PyPI
#   - On workflow_dispatch → build & publish to PyPI (for manual releases)
#
# Requires PYPI_TOKEN secret in repository settings
# Get token from: https://pypi.org/manage/account/token/

name: publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish_to_pypi:
    runs-on: ubuntu-latest
    env:
      IN_DOCKER: 'True'
      ANONYMIZED_TELEMETRY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Syntax check
        run: uv run --no-sync ruff check --no-fix --select PLE

      - name: Build package
        run: uv build

      - name: Verify package name contains yeti
        run: |
          echo "=== Built packages ==="
          ls -la dist/
          if ! ls dist/ | grep -qi yeti; then
            echo "ERROR: Package not named yeti-agent!"
            exit 1
          fi
          echo "=== Package name verified ==="

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          echo "Token length: ${#UV_PUBLISH_TOKEN}"
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "ERROR: PYPI_TOKEN secret is empty or not set!"
            echo "Go to: Settings > Secrets and variables > Actions > Repository secrets"
            echo "Add secret named PYPI_TOKEN with your PyPI API token"
            exit 1
          fi
          uv publish --verbose
