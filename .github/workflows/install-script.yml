name: Test Install Script

on:
  push:
    branches:
      - main
    paths:
      - 'browser_use/skill_cli/install.sh'
      - 'docs/install.sh'
      - '.github/workflows/install-script.yml'
  pull_request:
    paths:
      - 'browser_use/skill_cli/install.sh'
      - 'docs/install.sh'
      - '.github/workflows/install-script.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  YETI_AGENT_BRANCH: ${{ github.head_ref || github.ref_name }}
  YETI_AGENT_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

jobs:
  test-install-sh-linux:
    name: install.sh (Linux ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run install.sh
        run: bash browser_use/skill_cli/install.sh

      - name: Add to PATH
        run: |
          echo "$HOME/.yeti-agent-env/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          source ~/.yeti-agent-env/bin/activate
          yeti-agent --help || browser-use --help

      - name: Run doctor
        run: |
          source ~/.yeti-agent-env/bin/activate
          yeti-agent doctor || browser-use doctor

  test-install-sh-macos:
    name: install.sh (macOS ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh
        run: bash browser_use/skill_cli/install.sh

      - name: Add to PATH
        run: |
          echo "$HOME/.yeti-agent-env/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          source ~/.yeti-agent-env/bin/activate
          yeti-agent --help || browser-use --help

      - name: Run doctor
        run: |
          source ~/.yeti-agent-env/bin/activate
          yeti-agent doctor || browser-use doctor

  test-install-sh-windows:
    name: install.sh (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run install.sh
        run: bash browser_use/skill_cli/install.sh

      - name: Add to PATH
        run: |
          echo "$HOME/.yeti-agent-env/Scripts" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: |
          source ~/.yeti-agent-env/Scripts/activate
          yeti-agent --help || browser-use --help

      - name: Run doctor
        run: |
          source ~/.yeti-agent-env/Scripts/activate
          yeti-agent doctor || browser-use doctor

  test-uv-pip-install:
    name: uv pip install (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create venv and install yeti-agent
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install .

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify CLI
        run: |
          source .venv/bin/activate
          yeti-agent --help || browser-use --help

      - name: Run doctor
        run: |
          source .venv/bin/activate
          yeti-agent doctor || browser-use doctor
